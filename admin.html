<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Module Management</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body class="admin-body">

    <div id="login-section">
        <h2>Admin Login</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button id="loginBtn">Login</button>
        <p id="err" style="color:red; font-size:13px; margin-top:8px;"></p>
    </div>

    <div id="admin-panel" style="display:none;">
        <h2>Upload New Module</h2>
        <input type="text" id="gName" placeholder="Game Name">
        <input type="text" id="gUrl" placeholder="Game URL">
        <input type="text" id="gImg" placeholder="Thumbnail Image URL">
        <input type="text" id="gTags" placeholder="Tags (e.g. Action, IO)">
        <button id="uploadBtn">Add to Website</button>
        <button id="logoutBtn" style="background:#333; margin-top:8px;">Logout</button>
        <p id="status" style="color:#00d2ff; font-size:13px; margin-top:8px;"></p>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCjcuQ7xq6Sk-uo9h8tCY38UvZoKPTU2Sc",
            authDomain: "best-unblocked-games-7e4e3.firebaseapp.com",
            projectId: "best-unblocked-games-7e4e3",
            storageBucket: "best-unblocked-games-7e4e3.firebasestorage.app",
            messagingSenderId: "369397020855",
            appId: "1:369397020855:web:d47ec6c278f2594ce9b532"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('admin-panel').style.display = 'block';
            } else {
                document.getElementById('login-section').style.display = 'block';
                document.getElementById('admin-panel').style.display = 'none';
            }
        });

        document.getElementById('loginBtn').onclick = function() {
            var email = document.getElementById('email').value;
            var pass = document.getElementById('password').value;
            document.getElementById('err').textContent = 'Trying...';
            auth.signInWithEmailAndPassword(email, pass)
                .then(function() {
                    document.getElementById('err').textContent = 'Success!';
                })
                .catch(function(error) {
                    document.getElementById('err').textContent = error.message;
                });
        };

        document.getElementById('uploadBtn').onclick = function() {
            var name = document.getElementById('gName').value;
            var url = document.getElementById('gUrl').value;
            var image = document.getElementById('gImg').value;
            var tags = document.getElementById('gTags').value.toLowerCase();
            db.collection("games").add({
                name: name,
                url: url,
                image: image,
                tags: tags,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            }).then(function() {
                document.getElementById('status').textContent = 'Added!';
                document.getElementById('gName').value = '';
                document.getElementById('gUrl').value = '';
                document.getElementById('gImg').value = '';
                document.getElementById('gTags').value = '';
            }).catch(function(e) {
                document.getElementById('status').style.color = 'red';
                document.getElementById('status').textContent = e.message;
            });
        };

        document.getElementById('logoutBtn').onclick = function() {
            auth.signOut();
        };
    </script>
</body>
</html>
