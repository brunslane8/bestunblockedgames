<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Module Management</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body class="admin-body">

    <div id="login-section">
        <h2>Admin Login</h2>
        <input type="email"    id="email"    placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button id="loginBtn">Login</button>
        <p id="login-error" style="color:#ff4d4d; font-size:13px; margin-top:10px;"></p>
    </div>

    <div id="admin-panel" style="display:none;">
        <h2>Upload New Module</h2>
        <input type="text" id="gName" placeholder="Game Name">
        <input type="text" id="gUrl"  placeholder="Game URL (Monetag Link)">
        <input type="text" id="gImg"  placeholder="Thumbnail Image URL">
        <input type="text" id="gTags" placeholder="Tags (e.g. Action, IO, 2-Player)">
        <button id="uploadBtn">Add to Website</button>
        <button id="logoutBtn" style="background:#333; margin-top:8px;">Logout</button>
        <p id="upload-status" style="color:#00d2ff; font-size:13px; margin-top:10px;"></p>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCjcuQ7xq6Sk-uo9h8tCY38UvZoKPTU2Sc",
            authDomain: "best-unblocked-games-7e4e3.firebaseapp.com",
            projectId: "best-unblocked-games-7e4e3",
            storageBucket: "best-unblocked-games-7e4e3.firebasestorage.app",
            messagingSenderId: "369397020855",
            appId: "1:369397020855:web:d47ec6c278f2594ce9b532"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db   = firebase.firestore();

        // Watch auth state — show/hide panels accordingly
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('admin-panel').style.display   = 'block';
            } else {
                document.getElementById('login-section').style.display = 'block';
                document.getElementById('admin-panel').style.display   = 'none';
            }
        });

        // Login
        document.getElementById('loginBtn').onclick = () => {
            const email    = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errEl    = document.getElementById('login-error');
            errEl.textContent = '';

            if (!email || !password) {
                errEl.textContent = 'Please fill in both fields.';
                return;
            }

            auth.signInWithEmailAndPassword(email, password)
                .catch(err => {
                    errEl.textContent = err.message;
                });
        };

        // Upload game
        document.getElementById('uploadBtn').onclick = () => {
            const name  = document.getElementById('gName').value.trim();
            const url   = document.getElementById('gUrl').value.trim();
            const image = document.getElementById('gImg').value.trim();
            const tags  = document.getElementById('gTags').value.trim().toLowerCase();
            const statusEl = document.getElementById('upload-status');

            if (!name || !url) {
                statusEl.style.color = '#ff4d4d';
                statusEl.textContent = 'Name and URL are required.';
                return;
            }

            db.collection("games").add({
                name,
                url,
                image,
                tags,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => {
                statusEl.style.color = '#00d2ff';
                statusEl.textContent = 'Module added successfully!';
                // Clear fields
                ['gName','gUrl','gImg','gTags'].forEach(id => document.getElementById(id).value = '');
            }).catch(err => {
                statusEl.style.color = '#ff4d4d';
                statusEl.textContent = 'Error: ' + err.message;
            });
        };

        // Logout
        document.getElementById('logoutBtn').onclick = () => {
            auth.signOut();
        };
    </script>
</body>
</html>
