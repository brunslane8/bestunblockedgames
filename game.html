<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#0a0a0c; color:#e0e0e0; font-family:'Inter',sans-serif; height:100vh; display:flex; flex-direction:column; }
        #topbar { display:flex; align-items:center; justify-content:space-between; padding:12px 24px; background:#141417; border-bottom:1px solid #222; flex-shrink:0; }
        #topbar a { color:#00d2ff; text-decoration:none; font-size:14px; }
        #topbar h2 { font-size:16px; color:#e0e0e0; }
        #game-container { flex:1; position:relative; }
        #gameFrame { width:100%; height:100%; border:none; display:none; }

        /* Ad overlay */
        #adOverlay {
            position:absolute; inset:0;
            background:#0a0a0c;
            display:flex; flex-direction:column;
            justify-content:center; align-items:center;
            z-index:10;
        }
        #adOverlay h2 { font-size:28px; color:#e0e0e0; margin-bottom:8px; }
        #adOverlay p  { color:#666; font-size:14px; margin-bottom:40px; }
        #countdown-ring {
            width:120px; height:120px;
            border-radius:50%;
            border:4px solid #222;
            border-top:4px solid #00d2ff;
            display:flex; align-items:center; justify-content:center;
            font-size:36px; font-weight:800; color:#00d2ff;
            margin-bottom:32px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #countdown-number {
            position:absolute;
            font-size:36px; font-weight:800; color:#00d2ff;
            animation: none;
        }
        .ring-wrapper { position:relative; width:120px; height:120px; display:flex; align-items:center; justify-content:center; margin-bottom:32px; }
        .ring-svg { position:absolute; top:0; left:0; transform:rotate(-90deg); }
        .ring-bg { fill:none; stroke:#222; stroke-width:6; }
        .ring-fill { fill:none; stroke:#00d2ff; stroke-width:6; stroke-linecap:round; stroke-dasharray:314; stroke-dashoffset:0; transition:stroke-dashoffset 1s linear; }
        #skipBtn { display:none; padding:12px 32px; background:#00d2ff; color:#000; border:none; border-radius:8px; font-weight:bold; font-size:15px; cursor:pointer; }
        #adMessage { color:#444; font-size:12px; margin-top:20px; }

        /* banner slot */
        #bannerSlot { text-align:center; padding:8px; background:#0d0d10; border-top:1px solid #1a1a1a; flex-shrink:0; min-height:60px; display:flex; align-items:center; justify-content:center; color:#333; font-size:12px; }
    </style>
</head>
<body>
    <div id="topbar">
        <a href="index.html">← Back to Portal</a>
        <h2 id="gameTitle">Loading...</h2>
        <span id="topUser" style="font-size:13px; color:#666;"></span>
    </div>

    <div id="game-container">
        <iframe id="gameFrame" allowfullscreen allow="fullscreen"></iframe>

        <div id="adOverlay">
            <h2>Your game is loading</h2>
            <p>Please wait while we prepare your session</p>
            <div class="ring-wrapper">
                <svg class="ring-svg" width="120" height="120" viewBox="0 0 120 120">
                    <circle class="ring-bg" cx="60" cy="60" r="50"/>
                    <circle class="ring-fill" id="ringFill" cx="60" cy="60" r="50"/>
                </svg>
                <span id="countdown-number">15</span>
            </div>
            <button id="skipBtn" onclick="launchGame()">Play Now</button>
            <p id="adMessage">Advertisement helps keep this site free</p>

            <!-- DROP YOUR MONETAG BANNER CODE HERE -->
            <div style="margin-top:24px; min-height:90px; display:flex; align-items:center; justify-content:center; color:#333; font-size:12px;">
                [ Monetag Ad Unit ]
            </div>
        </div>
    </div>

    <div id="bannerSlot">
        <!-- DROP YOUR MONETAG BANNER CODE HERE -->
        [ Monetag Banner ]
    </div>

    <script>
        var firebaseConfig = {
            apiKey: "AIzaSyCjcuQ7xq6Sk-uo9h8tCY38UvZoKPTU2Sc",
            authDomain: "best-unblocked-games-7e4e3.firebaseapp.com",
            projectId: "best-unblocked-games-7e4e3",
            storageBucket: "best-unblocked-games-7e4e3.firebasestorage.app",
            messagingSenderId: "369397020855",
            appId: "1:369397020855:web:d47ec6c278f2594ce9b532"
        };
        firebase.initializeApp(firebaseConfig);
        var auth = firebase.auth();
        var db   = firebase.firestore();

        var params   = new URLSearchParams(window.location.search);
        var gameUrl  = params.get('url')  || '#';
        var gameName = params.get('name') || 'Game';

        document.title = gameName;
        document.getElementById('gameTitle').textContent = gameName;

        // Show username in topbar
        auth.onAuthStateChanged(function(user) {
            if (user) {
                db.collection('users').doc(user.uid).get().then(function(doc) {
                    var name = doc.exists ? doc.data().username : user.email;
                    document.getElementById('topUser').textContent = name;
                    // Save to progress
                    db.collection('users').doc(user.uid).update({
                        ['progress.' + gameName.replace(/[^a-zA-Z0-9]/g,'_')]: firebase.firestore.FieldValue.serverTimestamp()
                    });
                });
            }
        });

        // Countdown
        var TOTAL = 15;
        var count = TOTAL;
        var ring  = document.getElementById('ringFill');
        var circumference = 2 * Math.PI * 50; // 314
        ring.style.strokeDasharray  = circumference;
        ring.style.strokeDashoffset = 0;

        var timer = setInterval(function() {
            count--;
            document.getElementById('countdown-number').textContent = count;
            ring.style.strokeDashoffset = circumference * (1 - count / TOTAL);
            if (count <= 0) {
                clearInterval(timer);
                launchGame();
            }
        }, 1000);

        function launchGame() {
            clearInterval(timer);
            document.getElementById('adOverlay').style.display = 'none';
            document.getElementById('gameFrame').style.display = 'block';
            document.getElementById('gameFrame').src = gameUrl;
        }
    </script>
</body>
</html>
