<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Archive</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>
    <aside class="sidebar">
        <div class="logo">PORTAL</div>
        <ul id="fullList"></ul>
    </aside>
    <main class="content">
        <div class="top-nav">
            <input type="text" id="search" placeholder="Search modules by name or tag...">
        </div>
        <div class="grid" id="gameGrid"></div>
    </main>

    <a href="admin.html" style="position:fixed; bottom:20px; right:20px; background:#00d2ff; color:#000; padding:8px 16px; border-radius:8px; font-weight:bold; text-decoration:none; font-size:13px;">Admin</a>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCjcuQ7xq6Sk-uo9h8tCY38UvZoKPTU2Sc",
            authDomain: "best-unblocked-games-7e4e3.firebaseapp.com",
            projectId: "best-unblocked-games-7e4e3",
            storageBucket: "best-unblocked-games-7e4e3.firebasestorage.app",
            messagingSenderId: "369397020855",
            appId: "1:369397020855:web:d47ec6c278f2594ce9b532"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        db.collection("games").onSnapshot(function(snap) {
            var data = snap.docs.map(function(d) { return d.data(); });
            render(data);
        });

        function render(games) {
            var grid = document.getElementById('gameGrid');
            var list = document.getElementById('fullList');
            grid.innerHTML = '';
            list.innerHTML = '';

            if (games.length === 0) {
                grid.innerHTML = '<p style="color:#555; grid-column:1/-1;">No modules found.</p>';
                return;
            }

            games.forEach(function(g) {
                var name = g.name  || "Untitled Module";
                var url  = g.url   || "#";
                var img  = g.image || "https://via.placeholder.com/200x120?text=No+Image";
                var tags = g.tags  || "general";

                var li = document.createElement('li');
                li.innerText = name;
                li.onclick = function() { window.open(url, '_blank'); };
                list.appendChild(li);

                var card = document.createElement('div');
                card.className = 'card';
                card.onclick = function() { window.open(url, '_blank'); };
                card.innerHTML =
                    '<img src="' + img + '" alt="' + name + '" onerror="this.src=\'https://via.placeholder.com/200x120?text=Error\'">' +
                    '<div class="card-info"><h3>' + name + '</h3><p>' + tags + '</p></div>';
                grid.appendChild(card);
            });
        }

        document.getElementById('search').oninput = function(e) {
            var term = e.target.value.toLowerCase().trim();
            db.collection("games").get().then(function(snap) {
                var all = snap.docs.map(function(d) { return d.data(); });
                var filtered = term ? all.filter(function(g) {
                    var nameMatch = g.name && g.name.toLowerCase().includes(term);
                    var tagMatch  = g.tags && g.tags.toLowerCase().includes(term);
                    return nameMatch || tagMatch;
                }) : all;
                render(filtered);
            });
        };
    </script>
</body>
</html>
